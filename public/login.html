<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 | HYUNDAI YACHT CARE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .auth-split {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    @media (max-width: 900px) {
      .auth-split { grid-template-columns: 1fr; }
      .auth-brand { display: none; }
    }
    .auth-brand {
      background:
        linear-gradient(170deg, #001428 0%, #002D56 40%, #0a3d6b 70%, #10263C 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }
    .auth-brand::before {
      content:'';
      position:absolute; inset:0;
      background: radial-gradient(ellipse 80% 60% at 70% 35%, rgba(201,169,97,0.15), transparent 65%),
                  radial-gradient(ellipse 50% 40% at 10% 80%, rgba(0,20,40,0.6), transparent 60%);
    }
    .auth-brand::after {
      content:'';
      position:absolute; inset:0;
      background: radial-gradient(ellipse 60% 60% at 60% 40%, rgba(201,169,97,0.12), transparent);
    }
    .auth-brand-content { position:relative; z-index:1; text-align:center; }    .auth-brand-logo {
      display:flex; align-items:center; gap:14px; justify-content:center;
      margin-bottom:48px;
    }
    .auth-brand-title {
      font-size:clamp(28px,3vw,38px); font-weight:700; color:#fff;
      line-height:1.3; margin-bottom:16px; letter-spacing:-0.02em;
    }
    .auth-brand-sub {
      font-size:16px; color:rgba(255,255,255,0.65); line-height:1.7;
      max-width:380px; margin:0 auto 48px;
    }
    .auth-brand-stats {
      display:flex; gap:40px; justify-content:center;
    }
    .auth-brand-stat { text-align:center; }
    .auth-brand-stat-num {
      font-family:'Montserrat',sans-serif; font-size:26px; font-weight:700;
      color:var(--gold); line-height:1; margin-bottom:4px;
    }
    .auth-brand-stat-label { font-size:12px; color:rgba(255,255,255,0.5); }

    .auth-form-side {
      display:flex; align-items:center; justify-content:center;
      padding: 60px 40px;
      background: var(--white);
      overflow-y: auto;
    }
    .auth-form-inner {
      width: 100%; max-width: 420px;
    }
    .auth-form-logo {
      display:flex; align-items:center; gap:10px;
      margin-bottom:40px;
      text-decoration:none;
    }
    .auth-form-title { font-size:28px; font-weight:700; color:var(--navy); margin-bottom:6px; letter-spacing:-0.01em; }
    .auth-form-sub   { font-size:15px; color:var(--text-medium); margin-bottom:32px; }
  </style>
</head>
<body>
<div class="auth-split">

  <!-- Left: Brand panel -->
  <div class="auth-brand">
    <div class="auth-brand-content">
      <div class="auth-brand-logo">
        <svg viewBox="0 0 44 44" fill="none" width="44" height="44">
          <rect width="44" height="44" rx="5" fill="rgba(201,169,97,0.15)"/>
          <path d="M9 11 L9 33 M9 22 L35 22 M35 11 L35 33" stroke="#C9A961" stroke-width="3.5" stroke-linecap="round"/>
        </svg>
        <div>
          <div style="font-family:'Montserrat',sans-serif;font-size:22px;font-weight:800;letter-spacing:.14em;color:#fff">HYUNDAI</div>
          <div style="font-family:'Montserrat',sans-serif;font-size:10px;font-weight:500;letter-spacing:.35em;color:var(--gold)">YACHT CARE</div>
        </div>
      </div>
      <h2 class="auth-brand-title">요트의 가치를<br><span style="color:var(--gold)">완벽하게</span> 보존합니다</h2>
      <p class="auth-brand-sub">현대요트 케어서비스에 로그인하여 프리미엄 요트 관리 서비스를 이용하세요.</p>
      <div class="auth-brand-stats">
        <div class="auth-brand-stat">
          <div class="auth-brand-stat-num">850+</div>
          <div class="auth-brand-stat-label">완료 서비스</div>
        </div>
        <div class="auth-brand-stat">
          <div class="auth-brand-stat-num">98%</div>
          <div class="auth-brand-stat-label">만족도</div>
        </div>
        <div class="auth-brand-stat">
          <div class="auth-brand-stat-num">5년</div>
          <div class="auth-brand-stat-label">서비스 연혁</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right: Form panel -->
  <div class="auth-form-side">
    <div class="auth-form-inner">

      <a href="/" class="auth-form-logo">
        <div style="width:34px;height:34px;background:rgba(0,45,86,0.08);border-radius:5px;display:flex;align-items:center;justify-content:center">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
            <path d="M4 5 L4 19 M4 12 L20 12 M20 5 L20 19" stroke="#002D56" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div style="font-family:'Montserrat',sans-serif;font-size:16px;font-weight:800;letter-spacing:.12em;color:var(--navy)">HYUNDAI</div>
          <div style="font-family:'Montserrat',sans-serif;font-size:8px;font-weight:500;letter-spacing:.3em;color:var(--gold)">YACHT CARE</div>
        </div>
      </a>

      <h2 class="auth-form-title">로그인</h2>
      <p class="auth-form-sub">서비스 이용을 위해 로그인해주세요</p>

      <div id="loginAlert" class="alert"></div>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">이메일 <span class="required">*</span></label>
          <input type="email" class="form-input" id="email" placeholder="example@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호 <span class="required">*</span></label>
          <div style="position:relative">
            <input type="password" class="form-input" id="password" placeholder="비밀번호 입력" required autocomplete="current-password">
            <button type="button" onclick="togglePw()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-light);font-size:14px;background:none;border:none;cursor:pointer">
              <i class="fas fa-eye" id="pwIcon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;height:56px;font-size:15px" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i>&nbsp; 로그인
        </button>
      </form>

      <hr class="auth-divider">

      <div class="demo-box">
        <strong><i class="fas fa-lock" style="color:var(--gold);margin-right:6px"></i>데모 계정</strong>
        <div>관리자: admin@hyundaiyacht.com / Admin1234!</div>
        <div style="margin-top:4px">고객: demo@hyundaiyacht.com / Demo1234!</div>
      </div>

      <div class="auth-footer" style="margin-top:24px">
        계정이 없으신가요? <a href="/register.html">회원가입</a>
        &nbsp;·&nbsp; <a href="/">홈으로</a>
      </div>
    </div>
  </div>
</div>

<script>
function togglePw() {
  const pw = document.getElementById('password');
  const icon = document.getElementById('pwIcon');
  if (pw.type === 'password') { pw.type = 'text'; icon.className = 'fas fa-eye-slash'; }
  else { pw.type = 'password'; icon.className = 'fas fa-eye'; }
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const alertEl = document.getElementById('loginAlert');
  alertEl.className = 'alert';
  alertEl.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>&nbsp; 로그인 중...';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('yachtToken', data.token);
      localStorage.setItem('yachtUser', JSON.stringify(data.user));
      if (data.user.role === 'admin') { location.href = '/admin.html'; }
      else { location.href = new URLSearchParams(location.search).get('redirect') || '/dashboard.html'; }
    } else { throw new Error(data.error || '로그인에 실패했습니다.'); }
  } catch(err) {
    alertEl.className = 'alert error show';
    alertEl.style.display = 'block';
    alertEl.textContent = err.message || '로그인에 실패했습니다.';
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i>&nbsp; 로그인';
  }
}

const token = localStorage.getItem('yachtToken');
const user = JSON.parse(localStorage.getItem('yachtUser') || 'null');
if (token && user) { location.href = user.role === 'admin' ? '/admin.html' : '/dashboard.html'; }
</script>
</body>
</html>
